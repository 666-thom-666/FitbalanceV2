<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FITBALANCE — Прогресс</title>
    <meta name="theme-color" content="#00ff41">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/favicon.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand"><i class="fas fa-heart-pulse"></i> FITBALANCE</a>
        <div class="navbar-menu" id="topNav"></div>
    </nav>
    <div class="container">

        <h1 class="page-title"><i class="fas fa-chart-line"></i> Прогресс</h1>

        <div class="card">
            <h3 class="card-title"><i class="fas fa-trophy"></i> Достижения</h3>
            <div id="badges" class="badge-grid"></div>
        </div>

        <div class="card">
            <div class="card-head-row">
                <h3 class="card-title"><i class="fas fa-chart-area"></i> Графики</h3>
                <select id="rangeSel" class="form-input form-input-sm" onchange="loadAll()">
                    <option value="7">7 дней</option>
                    <option value="30" selected>30 дней</option>
                    <option value="90">90 дней</option>
                </select>
            </div>
        </div>

        <div class="card"><h3 class="card-title">Вес, кг</h3><canvas id="cWeight" height="110"></canvas></div>
        <div class="card"><h3 class="card-title">Калории: съедено / сожжено</h3><canvas id="cCal" height="110"></canvas></div>
        <div class="card"><h3 class="card-title">Шаги</h3><canvas id="cSteps" height="110"></canvas></div>
        <div class="card"><h3 class="card-title">Вода, мл</h3><canvas id="cWater" height="110"></canvas></div>
        <div class="card"><h3 class="card-title">Сон, ч</h3><canvas id="cSleep" height="110"></canvas></div>

    </div>
    <nav class="bottom-nav" id="bottomNav"></nav>
    <script src="/js/main.js"></script>
    <script src="/js/lib/chart.min.js"></script>
    <script>
        checkAuth();
        renderNav('/progress');

        const charts = {};
        const css = () => getComputedStyle(document.documentElement);
        async function stat(metric, days) {
            const r = await fetch(`${API_URL}/stats/${metric}?days=${days}`, { headers: getHeaders() });
            return r.ok ? r.json() : [];
        }
        function draw(id, type, labels, datasets) {
            if (charts[id]) charts[id].destroy();
            charts[id] = new Chart(document.getElementById(id), {
                type, data:{ labels, datasets },
                options:{ plugins:{legend:{display:datasets.length>1, labels:{color:css().getPropertyValue('--text-secondary')}}},
                    scales:{ y:{ticks:{color:css().getPropertyValue('--text-secondary')},grid:{color:css().getPropertyValue('--border-color')}},
                             x:{ticks:{color:css().getPropertyValue('--text-secondary')},grid:{display:false}} } }
            });
        }
        function merge(a, b) {
            const keys = [...new Set([...a.map(x=>x.date), ...b.map(x=>x.date)])].sort();
            const ma={}, mb={}; a.forEach(x=>ma[x.date]=x.value); b.forEach(x=>mb[x.date]=x.value);
            return { labels: keys.map(ruDate), va: keys.map(k=>ma[k]||0), vb: keys.map(k=>mb[k]||0) };
        }
        async function loadAll() {
            const days = parseInt(document.getElementById('rangeSel').value);
            const green = css().getPropertyValue('--green-primary'), blue = css().getPropertyValue('--blue'),
                  orange = css().getPropertyValue('--orange'), purple = css().getPropertyValue('--purple');
            const weight = await stat('weight', days);
            draw('cWeight','line', weight.map(x=>ruDate(x.date)), [{ label:'Вес', data:weight.map(x=>x.value), borderColor:green, backgroundColor:'rgba(0,255,65,.1)', fill:true, tension:.3 }]);
            const cin = await stat('calories', days), cout = await stat('burned', days);
            const m = merge(cin, cout);
            draw('cCal','bar', m.labels, [
                { label:'Съедено', data:m.va, backgroundColor:orange, borderRadius:4 },
                { label:'Сожжено', data:m.vb, backgroundColor:green, borderRadius:4 }]);
            const steps = await stat('steps', days);
            draw('cSteps','bar', steps.map(x=>ruDate(x.date)), [{ label:'Шаги', data:steps.map(x=>x.value), backgroundColor:green, borderRadius:4 }]);
            const water = await stat('water', days);
            draw('cWater','bar', water.map(x=>ruDate(x.date)), [{ label:'Вода', data:water.map(x=>x.value), backgroundColor:blue, borderRadius:4 }]);
            const sleep = await stat('sleep', days);
            draw('cSleep','line', sleep.map(x=>ruDate(x.date)), [{ label:'Сон', data:sleep.map(x=>x.value), borderColor:purple, backgroundColor:'rgba(157,78,221,.1)', fill:true, tension:.3 }]);
        }
        const BADGES = [
            { key:'workouts', need:1,  icon:'fa-dumbbell',      t:'Первая тренировка' },
            { key:'workouts', need:10, icon:'fa-fire',          t:'10 тренировок' },
            { key:'workouts', need:50, icon:'fa-medal',         t:'50 тренировок' },
            { key:'maxSteps', need:10000, icon:'fa-shoe-prints',t:'10 000 шагов за день' },
            { key:'days10k',  need:7,  icon:'fa-calendar-check', t:'Неделя по 10к шагов' },
            { key:'foodEntries', need:1, icon:'fa-utensils',    t:'Первая запись еды' },
            { key:'foodEntries', need:100, icon:'fa-bowl-food', t:'100 записей питания' },
            { key:'totalDistance', need:10, icon:'fa-route',    t:'10 км пройдено' },
            { key:'totalDistance', need:100, icon:'fa-earth-europe', t:'100 км пройдено' },
            { key:'weighIns', need:1, icon:'fa-weight-scale',   t:'Первое взвешивание' }
        ];
        async function loadBadges() {
            const r = await fetch(`${API_URL}/achievements`, { headers: getHeaders() });
            const s = await r.json();
            document.getElementById('badges').innerHTML = BADGES.map(b => {
                const got = (s[b.key]||0) >= b.need;
                return `<div class="badge ${got?'badge-on':'badge-off'}">
                    <i class="fas ${b.icon}"></i><span>${b.t}</span></div>`;
            }).join('');
        }
        loadBadges(); loadAll();

    </script>
</body>
</html>
