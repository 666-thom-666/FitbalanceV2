<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FITBALANCE — Калькулятор</title>
    <meta name="theme-color" content="#00ff41">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/favicon.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand"><i class="fas fa-heart-pulse"></i> FITBALANCE</a>
        <div class="navbar-menu" id="topNav"></div>
    </nav>
    <div class="container">

        <h1 class="page-title"><i class="fas fa-calculator"></i> Калькулятор</h1>

        <div class="card">
            <h3 class="card-title"><i class="fas fa-sliders"></i> Параметры</h3>
            <div class="form-grid">
                <div class="form-group"><label class="form-label">Возраст</label><input type="number" id="cAge" class="form-input"></div>
                <div class="form-group"><label class="form-label">Вес, кг</label><input type="number" id="cWeight" class="form-input" step="0.1"></div>
                <div class="form-group"><label class="form-label">Рост, см</label><input type="number" id="cHeight" class="form-input"></div>
                <div class="form-group"><label class="form-label">Пол</label>
                    <select id="cGender" class="form-input"><option value="male">Мужской</option><option value="female">Женский</option></select></div>
                <div class="form-group"><label class="form-label">Активность</label>
                    <select id="cLevel" class="form-input">
                        <option value="sedentary">Минимальная</option>
                        <option value="light">Лёгкая (1-3 р/нед)</option>
                        <option value="moderate" selected>Средняя (3-5 р/нед)</option>
                        <option value="active">Высокая (6-7 р/нед)</option>
                        <option value="very_active">Очень высокая</option>
                    </select></div>
                <div class="form-group"><label class="form-label">Цель</label>
                    <select id="cGoal" class="form-input">
                        <option value="lose">Похудение</option>
                        <option value="maintain" selected>Поддержание</option>
                        <option value="gain">Набор массы</option>
                    </select></div>
            </div>
            <button class="btn btn-block" onclick="calcAll()"><i class="fas fa-equals"></i> Рассчитать</button>
        </div>

        <div id="results" style="display:none">
            <div class="stats-grid">
                <div class="stat-card"><div class="stat-value" id="rBmr">0</div><div class="stat-label">BMR (ккал)</div></div>
                <div class="stat-card b-orange"><div class="stat-value" id="rTdee">0</div><div class="stat-label">Поддержание</div></div>
                <div class="stat-card b-blue"><div class="stat-value" id="rGoal">0</div><div class="stat-label">Цель (ккал)</div></div>
                <div class="stat-card b-purple"><div class="stat-value" id="rBmi">0</div><div class="stat-label">ИМТ</div></div>
            </div>

            <div class="card">
                <h3 class="card-title"><i class="fas fa-pie-chart"></i> Баланс БЖУ</h3>
                <div class="macro-row">
                    <div class="macro-box"><div class="macro-val" id="rProt">0</div><div class="macro-lbl">Белки, г</div></div>
                    <div class="macro-box"><div class="macro-val" id="rFat">0</div><div class="macro-lbl">Жиры, г</div></div>
                    <div class="macro-box"><div class="macro-val" id="rCarb">0</div><div class="macro-lbl">Углеводы, г</div></div>
                </div>
            </div>

            <div class="card">
                <h3 class="card-title"><i class="fas fa-info-circle"></i> Рекомендации</h3>
                <p id="bmiNote" class="note-line"></p>
                <p class="note-line"><i class="fas fa-glass-water" style="color:var(--blue)"></i> Норма воды: <strong id="rWater">0</strong> мл/день</p>
                <button class="btn btn-block" onclick="saveGoal()" style="margin-top:12px"><i class="fas fa-bullseye"></i> Сделать целью по калориям</button>
            </div>
        </div>

    </div>
    <nav class="bottom-nav" id="bottomNav"></nav>
    <script src="/js/main.js"></script>
    
    <script>
        checkAuth();
        renderNav('/calculator');

        let computedGoal = 0;
        (async () => {
            const u = getUser() || await loadUserProfile();
            if (u) {
                if (u.age) document.getElementById('cAge').value = u.age;
                if (u.weight) document.getElementById('cWeight').value = u.weight;
                if (u.height) document.getElementById('cHeight').value = u.height;
                if (u.gender) document.getElementById('cGender').value = u.gender;
                if (u.activity_level) document.getElementById('cLevel').value = u.activity_level;
            }
        })();
        function calcAll() {
            const age = +document.getElementById('cAge').value, weight = +document.getElementById('cWeight').value,
                  height = +document.getElementById('cHeight').value, gender = document.getElementById('cGender').value,
                  level = document.getElementById('cLevel').value, goal = document.getElementById('cGoal').value;
            if (!age || !weight || !height) return showNotification('Заполните все поля', 'error');
            const bmr = calculateBMR(weight, height, age, gender);
            const tdee = calculateTDEE(bmr, level);
            let target = tdee;
            if (goal === 'lose') target = tdee - 400;
            if (goal === 'gain') target = tdee + 300;
            computedGoal = Math.round(target);
            const bmi = weight / Math.pow(height/100, 2);
            document.getElementById('rBmr').textContent = Math.round(bmr);
            document.getElementById('rTdee').textContent = Math.round(tdee);
            document.getElementById('rGoal').textContent = computedGoal;
            document.getElementById('rBmi').textContent = bmi.toFixed(1);
            // БЖУ: 30% белки / 30% жиры / 40% углеводы
            document.getElementById('rProt').textContent = Math.round(target*0.30/4);
            document.getElementById('rFat').textContent = Math.round(target*0.30/9);
            document.getElementById('rCarb').textContent = Math.round(target*0.40/4);
            // вода ~ 30 мл/кг
            document.getElementById('rWater').textContent = Math.round(weight*30);
            let cat = '', col = '';
            if (bmi < 18.5){ cat='недостаточный вес'; col='var(--blue)'; }
            else if (bmi < 25){ cat='нормальный вес'; col='var(--green-primary)'; }
            else if (bmi < 30){ cat='избыточный вес'; col='var(--orange)'; }
            else { cat='ожирение'; col='var(--danger)'; }
            document.getElementById('bmiNote').innerHTML = `<i class="fas fa-weight-scale" style="color:${col}"></i> ИМТ ${bmi.toFixed(1)} — <strong style="color:${col}">${cat}</strong>`;
            document.getElementById('results').style.display = 'block';
        }
        async function saveGoal() {
            if (!computedGoal) return;
            await updateProfile({ daily_calorie_goal: computedGoal });
        }

    </script>
</body>
</html>
