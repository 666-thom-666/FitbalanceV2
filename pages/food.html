<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FITBALANCE — Питание</title>
    <meta name="theme-color" content="#00ff41">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/favicon.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand"><i class="fas fa-heart-pulse"></i> FITBALANCE</a>
        <div class="navbar-menu" id="topNav"></div>
    </nav>
    <div class="container">

        <h1 class="page-title"><i class="fas fa-utensils"></i> Питание</h1>

        <div class="card">
            <div class="flex between center-y" style="flex-wrap:wrap;gap:.5rem">
                <h3 class="card-title" style="margin:0"><i class="fas fa-bullseye"></i> Калории за сегодня</h3>
                <div><b id="calNow">0</b> <span class="muted">/ <span id="calGoal">2000</span> ккал</span></div>
            </div>
            <div class="progress-bar"><div class="progress-fill" id="calBar" style="width:0%"></div></div>
            <div class="stats-grid mt-1">
                <div class="stat-card b-blue"><div class="stat-value" id="mP">0</div><div class="stat-label">Белки, г</div></div>
                <div class="stat-card b-orange"><div class="stat-value" id="mF">0</div><div class="stat-label">Жиры, г</div></div>
                <div class="stat-card b-purple"><div class="stat-value" id="mC">0</div><div class="stat-label">Углеводы, г</div></div>
            </div>
        </div>

        <div class="card">
            <h3 class="card-title"><i class="fas fa-plus"></i> Добавить продукт</h3>
            <label class="form-label">Приём пищи</label>
            <div class="chips" id="mealChips"></div>
            <label class="form-label">Быстрый выбор (на порцию)</label>
            <div class="chips" id="foodDb"></div>
            <div class="form-group"><label class="form-label">Название</label><input type="text" id="fName" class="form-input" placeholder="Куриная грудка"></div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Калории</label><input type="number" id="fCal" class="form-input" placeholder="ккал"></div>
                <div class="form-group"><label class="form-label">Белки, г</label><input type="number" id="fP" class="form-input" placeholder="0"></div>
            </div>
            <div class="form-row">
                <div class="form-group"><label class="form-label">Жиры, г</label><input type="number" id="fF" class="form-input" placeholder="0"></div>
                <div class="form-group"><label class="form-label">Углеводы, г</label><input type="number" id="fC" class="form-input" placeholder="0"></div>
            </div>
            <button class="btn btn-primary btn-block" onclick="addFood()"><i class="fas fa-plus"></i> Добавить в дневник</button>
        </div>

        <div class="card">
            <h3 class="card-title"><i class="fas fa-book"></i> Дневник на сегодня</h3>
            <div id="diary"><div class="spinner"></div></div>
        </div>

    </div>
    <nav class="bottom-nav" id="bottomNav"></nav>
    <script src="/js/main.js"></script>
    
    <script>
        checkAuth();
        renderNav('/food');

        let meal='breakfast';
        const MEALS={breakfast:'Завтрак',lunch:'Обед',dinner:'Ужин',snack:'Перекус',other:'Другое'};
        const MEAL_ICONS={breakfast:'fa-mug-saucer',lunch:'fa-bowl-food',dinner:'fa-drumstick-bite',snack:'fa-apple-whole',other:'fa-utensils'};
        document.getElementById('mealChips').innerHTML=Object.keys(MEALS).map(k=>`<button class="chip ${k==='breakfast'?'active':''}" data-m="${k}" onclick="pickMeal('${k}')"><i class="fas ${MEAL_ICONS[k]}"></i> ${MEALS[k]}</button>`).join('');
        function pickMeal(m){ meal=m; document.querySelectorAll('#mealChips .chip').forEach(c=>c.classList.toggle('active',c.dataset.m===m)); }

        // Мини-база продуктов (на порцию)
        const DB=[
            ['Куриная грудка',165,31,3.6,0],['Овсянка',150,5,3,27],['Банан',105,1.3,0.4,27],
            ['Яйцо',78,6,5,0.6],['Гречка',130,4.5,1,25],['Творог 5%',145,18,5,3],
            ['Рис варёный',130,2.7,0.3,28],['Яблоко',52,0.3,0.2,14],['Лосось',208,20,13,0],
            ['Греческий йогурт',100,10,4,4],['Хлеб цельнозерновой',80,4,1,15],['Орехи (горсть)',180,5,16,6],
            ['Протеиновый коктейль',120,24,1.5,3],['Салат овощной',60,2,3,7],['Картофель',87,2,0.1,20]
        ];
        document.getElementById('foodDb').innerHTML=DB.map((f,i)=>`<button class="chip" onclick="pick(${i})">${f[0]} · ${f[1]}</button>`).join('');
        function pick(i){ const f=DB[i]; document.getElementById('fName').value=f[0]; document.getElementById('fCal').value=f[1];
            document.getElementById('fP').value=f[2]; document.getElementById('fF').value=f[3]; document.getElementById('fC').value=f[4]; }

        async function addFood(){
            const food_name=document.getElementById('fName').value, calories=parseFloat(document.getElementById('fCal').value);
            if(!food_name||!calories){ showNotification('Укажите название и калории','error'); return; }
            const body={food_name,calories,protein:parseFloat(document.getElementById('fP').value)||0,fats:parseFloat(document.getElementById('fF').value)||0,carbs:parseFloat(document.getElementById('fC').value)||0,meal_type:meal,date:getCurrentDate()};
            const r=await fetch(`${API_URL}/food`,{method:'POST',headers:getHeaders(),body:JSON.stringify(body)});
            if(r.ok){ showNotification('Добавлено'); ['fName','fCal','fP','fF','fC'].forEach(i=>document.getElementById(i).value=''); loadDiary(); }
        }
        async function delFood(id){ await fetch(`${API_URL}/food/${id}`,{method:'DELETE',headers:getHeaders()}); loadDiary(); }
        async function loadDiary(){
            const r=await fetch(`${API_URL}/food?date=${getCurrentDate()}`,{headers:getHeaders()});
            const rows=await r.json();
            let tc=0,tp=0,tf=0,tcb=0; rows.forEach(f=>{tc+=f.calories;tp+=f.protein||0;tf+=f.fats||0;tcb+=f.carbs||0;});
            const goal=getUser()?.daily_calorie_goal||2000;
            document.getElementById('calNow').textContent=Math.round(tc);
            document.getElementById('calGoal').textContent=Math.round(goal);
            document.getElementById('calBar').style.width=Math.min(tc/goal*100,100)+'%';
            document.getElementById('mP').textContent=Math.round(tp);
            document.getElementById('mF').textContent=Math.round(tf);
            document.getElementById('mC').textContent=Math.round(tcb);
            const el=document.getElementById('diary');
            if(!rows.length){ el.innerHTML='<p class="muted">Пока ничего не добавлено.</p>'; return; }
            let html='';
            for(const mk of Object.keys(MEALS)){
                const items=rows.filter(f=>(f.meal_type||'other')===mk); if(!items.length) continue;
                html+=`<div style="margin-bottom:.8rem"><div class="muted" style="font-weight:600;margin:.4rem 0"><i class="fas ${MEAL_ICONS[mk]}"></i> ${MEALS[mk]} · ${Math.round(items.reduce((s,i)=>s+i.calories,0))} ккал</div>`;
                html+=items.map(f=>`<div class="log-item"><div class="li-main"><div class="li-icon"><i class="fas ${MEAL_ICONS[mk]}"></i></div>
                    <div><div class="li-title">${f.food_name}</div><div class="li-sub">${Math.round(f.calories)} ккал · Б${Math.round(f.protein||0)} Ж${Math.round(f.fats||0)} У${Math.round(f.carbs||0)}</div></div></div>
                    <button class="btn btn-danger" onclick="delFood(${f.id})"><i class="fas fa-trash"></i></button></div>`).join('');
                html+='</div>';
            }
            el.innerHTML=html;
        }
        loadDiary();

    </script>
</body>
</html>
