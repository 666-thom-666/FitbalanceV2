<!DOCTYPE html>
<html lang="ru" data-theme="dark">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <title>FITBALANCE — Профиль</title>
    <meta name="theme-color" content="#00ff41">
    <link rel="manifest" href="/manifest.json">
    <link rel="icon" href="/icons/favicon.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">
    <link rel="stylesheet" href="/css/style.css">
    <link rel="stylesheet" href="/vendor/fontawesome/css/all.min.css">
</head>
<body>
    <nav class="navbar">
        <a href="/dashboard" class="navbar-brand"><i class="fas fa-heart-pulse"></i> FITBALANCE</a>
        <div class="navbar-menu" id="topNav"></div>
    </nav>
    <div class="container">

        <h1 class="page-title"><i class="fas fa-user"></i> Профиль</h1>

        <div class="card">
            <h3 class="card-title"><i class="fas fa-id-card"></i> Личные данные</h3>
            <div class="form-grid">
                <div class="form-group"><label class="form-label">Имя</label><input type="text" id="pName" class="form-input"></div>
                <div class="form-group"><label class="form-label">Возраст</label><input type="number" id="pAge" class="form-input"></div>
                <div class="form-group"><label class="form-label">Вес, кг</label><input type="number" id="pWeight" class="form-input" step="0.1"></div>
                <div class="form-group"><label class="form-label">Рост, см</label><input type="number" id="pHeight" class="form-input"></div>
                <div class="form-group"><label class="form-label">Пол</label>
                    <select id="pGender" class="form-input"><option value="male">Мужской</option><option value="female">Женский</option></select></div>
                <div class="form-group"><label class="form-label">Активность</label>
                    <select id="pLevel" class="form-input">
                        <option value="sedentary">Минимальная</option><option value="light">Лёгкая</option>
                        <option value="moderate">Средняя</option><option value="active">Высокая</option>
                        <option value="very_active">Очень высокая</option></select></div>
            </div>
            <button class="btn btn-block" onclick="savePersonal()"><i class="fas fa-floppy-disk"></i> Сохранить данные</button>
        </div>

        <div class="card">
            <h3 class="card-title"><i class="fas fa-bullseye"></i> Цели</h3>
            <div class="form-grid">
                <div class="form-group"><label class="form-label">Калории, ккал/день</label><input type="number" id="gCal" class="form-input"></div>
                <div class="form-group"><label class="form-label">Шаги/день</label><input type="number" id="gSteps" class="form-input"></div>
                <div class="form-group"><label class="form-label">Вода, мл/день</label><input type="number" id="gWater" class="form-input"></div>
                <div class="form-group"><label class="form-label">Сон, ч/день</label><input type="number" id="gSleep" class="form-input" step="0.5"></div>
                <div class="form-group"><label class="form-label">Активные минуты/день</label><input type="number" id="gActive" class="form-input"></div>
            </div>
            <button class="btn btn-block" onclick="saveGoals()"><i class="fas fa-floppy-disk"></i> Сохранить цели</button>
        </div>

        <div class="card">
            <h3 class="card-title"><i class="fas fa-palette"></i> Оформление</h3>
            <div class="settings-row">
                <span>Тёмная / светлая тема</span>
                <button class="btn btn-outline" onclick="toggleTheme()"><i class="fas fa-circle-half-stroke"></i> Переключить</button>
            </div>
        </div>

        <div class="card">
            <button class="btn btn-danger btn-block" onclick="logout()"><i class="fas fa-right-from-bracket"></i> Выйти</button>
        </div>

    </div>
    <nav class="bottom-nav" id="bottomNav"></nav>
    <script src="/js/main.js"></script>
    
    <script>
        checkAuth();
        renderNav('/profile');

        async function fillProfile() {
            const u = await loadUserProfile() || getUser();
            if (!u) return;
            document.getElementById('pName').value = u.full_name || '';
            document.getElementById('pAge').value = u.age || '';
            document.getElementById('pWeight').value = u.weight || '';
            document.getElementById('pHeight').value = u.height || '';
            if (u.gender) document.getElementById('pGender').value = u.gender;
            if (u.activity_level) document.getElementById('pLevel').value = u.activity_level;
            document.getElementById('gCal').value = u.daily_calorie_goal || '';
            document.getElementById('gSteps').value = u.step_goal || 10000;
            document.getElementById('gWater').value = u.water_goal || 2000;
            document.getElementById('gSleep').value = u.sleep_goal || 8;
            document.getElementById('gActive').value = u.active_minutes_goal || 30;
        }
        async function savePersonal() {
            await updateProfile({
                full_name: document.getElementById('pName').value,
                age: +document.getElementById('pAge').value || null,
                weight: +document.getElementById('pWeight').value || null,
                height: +document.getElementById('pHeight').value || null,
                gender: document.getElementById('pGender').value,
                activity_level: document.getElementById('pLevel').value
            });
        }
        async function saveGoals() {
            await updateProfile({
                daily_calorie_goal: +document.getElementById('gCal').value || null,
                step_goal: +document.getElementById('gSteps').value || 10000,
                water_goal: +document.getElementById('gWater').value || 2000,
                sleep_goal: +document.getElementById('gSleep').value || 8,
                active_minutes_goal: +document.getElementById('gActive').value || 30
            });
        }
        fillProfile();

    </script>
</body>
</html>
